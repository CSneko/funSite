<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多角色AI对话工作台</title>
    <style>
        :root {
            --bg: #1a1b1e;
            --bg-secondary: #212326;
            --bg-tertiary: #282a2e;
            --bg-input: #1e1f23;
            --border: #333538;
            --border-active: #555;
            --text: #e3e3e3;
            --text-secondary: #a0a0a5;
            --text-muted: #6b6b70;
            --accent: #6c8cff;
            --accent-hover: #8aa4ff;
            --accent-dim: #3d4f8a;
            --danger: #e0556a;
            --danger-hover: #f07080;
            --success: #4caf84;
            --warning: #e0a850;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.45);
            --radius: 10px;
            --radius-sm: 6px;
            --radius-xs: 4px;
            --transition: 0.2s ease;
            --font-mono: 'SF Mono', 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== 左侧面板 ========== */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform var(--transition);
        }
        .sidebar-header {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
        }
        .sidebar-header h2 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.01em;
            white-space: nowrap;
            color: var(--text);
        }
        .sidebar-header .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            box-shadow: 0 0 8px var(--accent);
        }
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-tab {
            flex: 1;
            text-align: center;
            padding: 11px 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            transition: all var(--transition);
            border-bottom: 2px solid transparent;
            letter-spacing: 0.02em;
            background: transparent;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .sidebar-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .sidebar-tab:hover {
            color: var(--text);
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .sidebar-content::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        .sidebar-item {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            position: relative;
            border: 1px solid transparent;
            color: var(--text-secondary);
        }
        .sidebar-item:hover {
            background: var(--bg-tertiary);
            color: var(--text);
        }
        .sidebar-item.active {
            background: var(--bg-tertiary);
            border-color: var(--border-active);
            color: var(--text);
            font-weight: 600;
        }
        .sidebar-item .item-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .sidebar-item .item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sidebar-item .item-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .sidebar-item:hover .item-actions {
            opacity: 1;
        }
        .sidebar-item .btn-icon-sm {
            width: 24px;
            height: 24px;
            border-radius: var(--radius-xs);
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .sidebar-item .btn-icon-sm:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }
        .sidebar-item .btn-icon-sm.danger:hover {
            color: var(--danger);
            background: rgba(224, 85, 106, 0.15);
        }
        .sidebar-footer {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.01em;
            font-family: var(--font-sans);
        }
        .btn:hover {
            background: #34363b;
            border-color: var(--border-active);
        }
        .btn.accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }
        .btn.accent:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        .btn.danger {
            border-color: transparent;
            color: var(--danger);
        }
        .btn.danger:hover {
            background: rgba(224, 85, 106, 0.12);
            border-color: rgba(224, 85, 106, 0.3);
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 11px;
            border-radius: var(--radius-xs);
        }
        .btn-xs {
            padding: 3px 7px;
            font-size: 10px;
            border-radius: var(--radius-xs);
        }

        /* ========== 中间对话区域 ========== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg);
        }
        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            background: var(--bg-secondary);
        }
        .chat-header h3 {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .chat-header .badge {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }
        .chat-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            padding: 40px;
            line-height: 1.7;
        }
        .chat-empty .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 消息气泡 */
        .msg-wrapper {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg-wrapper.user {
            align-items: flex-end;
        }
        .msg-wrapper.assistant {
            align-items: flex-start;
        }
        .msg-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.02em;
        }
        .msg-sender .sender-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .msg-bubble {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 13.5px;
            position: relative;
            word-break: break-word;
            white-space: pre-wrap;
            transition: all var(--transition);
            letter-spacing: 0.01em;
        }
        .msg-wrapper.user .msg-bubble {
            background: var(--accent-dim);
            border: 1px solid rgba(108, 140, 255, 0.25);
            border-bottom-right-radius: 4px;
            color: #d0d8ff;
        }
        .msg-wrapper.assistant .msg-bubble {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text);
        }
        .msg-bubble.editing {
            border-color: var(--warning) !important;
            box-shadow: 0 0 0 2px rgba(224, 168, 80, 0.2);
        }
        .msg-bubble textarea {
            width: 100%;
            min-width: 300px;
            min-height: 80px;
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border-active);
            border-radius: var(--radius-sm);
            padding: 10px;
            font-family: var(--font-sans);
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            letter-spacing: 0.01em;
        }
        .msg-bubble textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(108, 140, 255, 0.15);
        }
        .msg-actions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            opacity: 0;
            transition: opacity var(--transition);
            flex-wrap: wrap;
        }
        .msg-wrapper:hover .msg-actions {
            opacity: 1;
        }
        .msg-thinking {
            margin-top: 8px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--warning);
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.35s ease, opacity 0.3s ease, padding 0.3s ease, margin 0.3s ease;
        }
        .msg-thinking.expanded {
            max-height: 600px;
            opacity: 1;
            overflow-y: auto;
        }
        .msg-thinking-label {
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--warning);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .msg-thinking-content {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }

        /* ========== 输入区域 ========== */
        .chat-input-area {
            border-top: 1px solid var(--border);
            padding: 14px 20px;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }
        .reply-order-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .reply-order-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .reply-order-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .reply-tag {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px dashed var(--border);
            color: var(--text-muted);
            background: transparent;
        }
        .reply-tag.selected {
            border-style: solid;
            border-color: var(--accent);
            background: rgba(108, 140, 255, 0.1);
            color: var(--accent);
            font-weight: 600;
        }
        .reply-tag:hover {
            border-color: var(--border-active);
            color: var(--text);
        }
        .reply-tag.selected:hover {
            border-color: var(--accent-hover);
            color: var(--accent-hover);
        }
        .reply-tag .tag-order {
            font-size: 10px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .reply-tag .tag-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-row textarea {
            flex: 1;
            resize: none;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 13.5px;
            line-height: 1.5;
            min-height: 44px;
            max-height: 150px;
            letter-spacing: 0.01em;
            transition: border-color var(--transition);
        }
        .input-row textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(108, 140, 255, 0.1);
        }
        .input-row textarea::placeholder {
            color: var(--text-muted);
        }
        .btn-send {
            padding: 11px 22px;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            white-space: nowrap;
            font-family: var(--font-sans);
            height: 44px;
            align-self: flex-end;
        }
        .btn-send:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(108, 140, 255, 0.3);
        }
        .btn-send:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-send.loading {
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        /* ========== 模态框 ========== */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInBg 0.2s ease;
        }
        @keyframes fadeInBg {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 520px;
            max-width: 92vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 18px;
            letter-spacing: -0.01em;
        }
        .modal .form-group {
            margin-bottom: 14px;
        }
        .modal label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .modal input,
        .modal textarea,
        .modal select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 13px;
            transition: border-color var(--transition);
        }
        .modal input:focus,
        .modal textarea:focus,
        .modal select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(108, 140, 255, 0.1);
        }
        .modal textarea {
            resize: vertical;
            min-height: 80px;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.5;
        }
        .modal .form-row {
            display: flex;
            gap: 10px;
        }
        .modal .form-row>* {
            flex: 1;
        }
        .modal .btn-row {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .modal .color-preview {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 6px;
            border: 2px solid var(--border);
        }
        .modal input[type="color"] {
            width: 36px;
            height: 36px;
            padding: 2px;
            cursor: pointer;
            border-radius: var(--radius-xs);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            animation: slideInRight 0.3s ease;
            box-shadow: var(--shadow);
            letter-spacing: 0.01em;
        }
        .toast.success {
            background: #1a3d2b;
            border: 1px solid var(--success);
            color: #7dd4a4;
        }
        .toast.error {
            background: #3d1a1f;
            border: 1px solid var(--danger);
            color: #f0a0a8;
        }
        .toast.info {
            background: #1a2a3d;
            border: 1px solid var(--accent);
            color: #a0b8ff;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-toggle {
                display: flex !important;
            }
            .msg-bubble {
                max-width: 92%;
            }
            .chat-messages {
                padding: 12px 10px;
                gap: 10px;
            }
            .chat-input-area {
                padding: 10px 12px;
            }
            .modal {
                width: 95vw;
                padding: 16px;
            }
        }
        .sidebar-toggle {
            display: none;
            position: fixed;
            left: 10px;
            top: 14px;
            z-index: 55;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: var(--shadow);
        }
        @media (min-width: 769px) {
            .sidebar-toggle {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- 移动端侧边栏切换 -->
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="菜单">☰</button>

    <!-- ========== 左侧面板 ========== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>AI 对话工作台</h2>
            <span class="logo-dot"></span>
        </div>
        <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="sessions" onclick="switchSidebarTab('sessions')">💬 会话</button>
            <button class="sidebar-tab" data-tab="characters" onclick="switchSidebarTab('characters')">🤖 角色</button>
        </div>
        <div class="sidebar-content" id="sidebarContent">
            <!-- 动态填充 -->
        </div>
        <div class="sidebar-footer" id="sidebarFooter">
            <!-- 动态填充 -->
        </div>
    </aside>

    <!-- ========== 中间主区域 ========== -->
    <div class="main-area" id="mainArea">
        <div class="chat-header" id="chatHeader">
            <h3 id="chatTitle">选择或创建一个会话</h3>
            <span class="badge" id="chatBadge" style="display:none;"></span>
            <button class="btn btn-sm" onclick="exportData()" title="导出数据">📥 导出</button>
            <button class="btn btn-sm" onclick="document.getElementById('importFileInput').click()" title="导入数据">📤 导入</button>
            <input type="file" id="importFileInput" style="display:none;" accept=".json" onchange="importData(event)">
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty">
                <div>
                    <div class="empty-icon">💬</div>
                    <div>选择一个会话开始对话</div>
                    <div style="font-size:12px;margin-top:6px;color:var(--text-muted);">或创建新会话、配置AI角色</div>
                </div>
            </div>
        </div>
        <div class="chat-input-area" id="chatInputArea">
            <div class="reply-order-bar" id="replyOrderBar">
                <span class="reply-order-label">回复顺序：</span>
                <span class="reply-order-tags" id="replyOrderTags"></span>
                <button class="btn btn-xs" onclick="resetReplyOrder()" title="重置为全部角色参与">重置</button>
            </div>
            <div class="input-row">
                <textarea id="userInput" rows="1" placeholder="输入消息... (Enter发送，Shift+Enter换行)" onkeydown="handleInputKey(event)"></textarea>
                <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>发送</button>
            </div>
        </div>
    </div>

    <!-- ========== 角色编辑模态框 ========== -->
    <div id="characterModal" class="modal-backdrop" style="display:none;" onclick="if(event.target===this)closeCharacterModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 id="characterModalTitle">编辑角色</h3>
            <div class="form-group">
                <label>角色名称</label>
                <input type="text" id="charName" placeholder="例如：技术顾问">
            </div>
            <div class="form-group">
                <label>标识颜色</label>
                <div style="display:flex;align-items:center;gap:10px;">
                    <input type="color" id="charColor" value="#6c8cff" style="width:50px;height:32px;">
                    <span style="font-size:12px;color:var(--text-muted);">用于区分不同角色的消息</span>
                </div>
            </div>
            <div class="form-group">
                <label>System Prompt（系统提示词）</label>
                <textarea id="charPrompt" rows="4" placeholder="定义角色的行为、语气和专业领域...&#10;此提示词仅该角色可见，其他角色不知道。"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>模型</label>
                    <input type="text" id="charModel" placeholder="gpt-4 / deepseek-chat / claude-3-opus">
                </div>
                <div class="form-group">
                    <label>Temperature</label>
                    <input type="number" id="charTemp" value="0.7" step="0.05" min="0" max="2" placeholder="0.7">
                </div>
                <div class="form-group">
                    <label>Max Tokens</label>
                    <input type="number" id="charMaxTokens" value="2048" step="64" min="64" max="128000" placeholder="2048">
                </div>
            </div>
            <div class="form-group">
                <label>API Base URL</label>
                <input type="text" id="charApiBase" placeholder="https://api.openai.com/v1">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="charApiKey" placeholder="sk-...（留空则使用全局默认Key）">
            </div>
            <div class="btn-row">
                <button class="btn danger btn-sm" id="btnDeleteChar" style="display:none;margin-right:auto;" onclick="deleteCharacter()">删除角色</button>
                <button class="btn btn-sm" onclick="closeCharacterModal()">取消</button>
                <button class="btn accent btn-sm" onclick="saveCharacter()">保存</button>
            </div>
        </div>
    </div>

    <!-- ========== Toast容器 ========== -->
    <div id="toastContainer"></div>

    <script>
        (function() {
            // ==================== 数据管理 ====================
            const STORAGE_KEY = 'ai_chat_workspace_data';
            const DEFAULT_API_BASE = 'https://api.openai.com/v1';

            let appData = {
                characters: [],
                sessions: [],
                globalApiKey: '',
                globalApiBase: DEFAULT_API_BASE,
                activeSessionId: null,
                sidebarTab: 'sessions',
                editingCharId: null,
            };

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        appData.characters = parsed.characters || [];
                        appData.sessions = parsed.sessions || [];
                        appData.globalApiKey = parsed.globalApiKey || '';
                        appData.globalApiBase = parsed.globalApiBase || DEFAULT_API_BASE;
                        appData.activeSessionId = parsed.activeSessionId || null;
                        appData.sidebarTab = parsed.sidebarTab || 'sessions';
                    }
                } catch (e) {
                    console.error('数据加载失败:', e);
                    showToast('数据加载失败，已重置', 'error');
                }
                // 确保至少有一个默认角色
                if (appData.characters.length === 0) {
                    appData.characters.push({
                        id: generateId(),
                        name: '默认助手',
                        color: '#6c8cff',
                        systemPrompt: '你是一个有帮助的AI助手。请用中文回复。',
                        model: 'gpt-4',
                        temperature: 0.7,
                        maxTokens: 2048,
                        apiBase: '',
                        apiKey: '',
                        createdAt: Date.now(),
                    });
                }
                // 确保至少有一个默认会话
                if (appData.sessions.length === 0) {
                    appData.sessions.push({
                        id: generateId(),
                        name: '新对话',
                        messages: [],
                        replyOrder: appData.characters.map(c => c.id),
                        createdAt: Date.now(),
                    });
                    appData.activeSessionId = appData.sessions[0].id;
                }
                // 验证活跃会话
                if (appData.activeSessionId && !appData.sessions.find(s => s.id === appData.activeSessionId)) {
                    appData.activeSessionId = appData.sessions[0]?.id || null;
                }
                if (!appData.activeSessionId && appData.sessions.length > 0) {
                    appData.activeSessionId = appData.sessions[0].id;
                }
            }

            function saveData() {
                try {
                    const toSave = {
                        characters: appData.characters,
                        sessions: appData.sessions,
                        globalApiKey: appData.globalApiKey,
                        globalApiBase: appData.globalApiBase,
                        activeSessionId: appData.activeSessionId,
                        sidebarTab: appData.sidebarTab,
                    };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
                } catch (e) {
                    showToast('存储空间不足，请导出数据后清理', 'error');
                }
            }

            function generateId() {
                return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
            }

            function getActiveSession() {
                return appData.sessions.find(s => s.id === appData.activeSessionId) || null;
            }

            function getCharacterById(id) {
                return appData.characters.find(c => c.id === id) || null;
            }

            // ==================== UI渲染 ====================
            function renderAll() {
                renderSidebar();
                renderChatArea();
                renderReplyOrder();
                updateSendButton();
            }

            function renderSidebar() {
                const content = document.getElementById('sidebarContent');
                const footer = document.getElementById('sidebarFooter');
                const tabs = document.querySelectorAll('.sidebar-tab');
                tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === appData.sidebarTab));

                if (appData.sidebarTab === 'sessions') {
                    // 会话列表
                    content.innerHTML = appData.sessions.map(s => {
                        const isActive = s.id === appData.activeSessionId;
                        const msgCount = s.messages.length;
                        return `
                            <div class="sidebar-item ${isActive ? 'active' : ''}" 
                                 onclick="selectSession('${s.id}')" 
                                 title="${escapeHtml(s.name)} - ${msgCount}条消息">
                                <span style="font-size:14px;">💬</span>
                                <span class="item-name">${escapeHtml(s.name)}</span>
                                <span style="font-size:10px;color:var(--text-muted);">${msgCount}</span>
                                <span class="item-actions">
                                    <button class="btn-icon-sm" onclick="event.stopPropagation();renameSession('${s.id}')" title="重命名">✏️</button>
                                    <button class="btn-icon-sm danger" onclick="event.stopPropagation();deleteSession('${s.id}')" title="删除">🗑</button>
                                </span>
                            </div>`;
                    }).join('');
                    footer.innerHTML = `
                        <button class="btn accent btn-sm" onclick="createSession()" style="flex:1;">+ 新建会话</button>
                        <button class="btn btn-sm" onclick="clearAllSessions()" title="清空所有会话">清空</button>`;
                } else {
                    // 角色列表
                    content.innerHTML = appData.characters.map(c => `
                        <div class="sidebar-item" onclick="openCharacterEditor('${c.id}')" title="${escapeHtml(c.name)} - ${escapeHtml(c.model)}">
                            <span class="item-dot" style="background:${c.color};"></span>
                            <span class="item-name">${escapeHtml(c.name)}</span>
                            <span style="font-size:10px;color:var(--text-muted);">${escapeHtml(c.model)}</span>
                            <span class="item-actions">
                                <button class="btn-icon-sm" onclick="event.stopPropagation();duplicateCharacter('${c.id}')" title="复制">📋</button>
                                <button class="btn-icon-sm danger" onclick="event.stopPropagation();deleteCharacterById('${c.id}')" title="删除">🗑</button>
                            </span>
                        </div>`).join('');
                    footer.innerHTML = `
                        <button class="btn accent btn-sm" onclick="openCharacterEditor(null)" style="flex:1;">+ 新建角色</button>
                        <button class="btn btn-sm" onclick="openGlobalSettings()">⚙️ 全局设置</button>`;
                }
            }

            function renderChatArea() {
                const session = getActiveSession();
                const titleEl = document.getElementById('chatTitle');
                const badgeEl = document.getElementById('chatBadge');
                const messagesEl = document.getElementById('chatMessages');

                if (!session) {
                    titleEl.textContent = '选择或创建一个会话';
                    badgeEl.style.display = 'none';
                    messagesEl.innerHTML = `
                        <div class="chat-empty">
                            <div><div class="empty-icon">💬</div>
                            <div>选择一个会话开始对话</div></div>
                        </div>`;
                    return;
                }
                titleEl.textContent = session.name;
                const charCount = (session.replyOrder || []).length;
                badgeEl.style.display = charCount > 0 ? 'inline' : 'none';
                badgeEl.textContent = `${charCount}个角色参与回复`;

                if (session.messages.length === 0) {
                    messagesEl.innerHTML = `
                        <div class="chat-empty">
                            <div><div class="empty-icon">✨</div>
                            <div>开始新对话吧</div>
                            <div style="font-size:12px;margin-top:4px;color:var(--text-muted);">下方输入消息后将按角色顺序依次回复</div></div>
                        </div>`;
                } else {
                    messagesEl.innerHTML = session.messages.map((msg, idx) => {
                        const isUser = msg.role === 'user';
                        const char = isUser ? null : getCharacterById(msg.characterId);
                        const senderName = isUser ? '你' : (char ? char.name : (msg.characterName ||
                            '未知角色'));
                        const senderColor = isUser ? '#888' : (char ? char.color : '#888');
                        const hasThinking = msg.thinking && msg.thinking.trim();
                        const isEditing = msg._editing || false;
                        const wrapperClass = isUser ? 'user' : 'assistant';
                        return `
                        <div class="msg-wrapper ${wrapperClass}" data-msg-id="${msg.id}">
                            <div class="msg-sender">
                                <span class="sender-dot" style="background:${senderColor};"></span>
                                ${escapeHtml(senderName)}
                                ${!isUser && char ? `<span style="font-size:10px;color:var(--text-muted);font-weight:400;">(${escapeHtml(char.model)})</span>` : ''}
                            </div>
                            <div class="msg-bubble ${isEditing ? 'editing' : ''}" id="bubble-${msg.id}">
                                ${isEditing ? 
                                    `<textarea id="editTextarea-${msg.id}" onkeydown="if(event.key==='Escape')cancelEdit('${msg.id}')">${escapeHtml(msg.content)}</textarea>
                                     <div style="display:flex;gap:6px;margin-top:8px;">
                                        <button class="btn btn-sm accent" onclick="saveEdit('${msg.id}')">保存</button>
                                        <button class="btn btn-sm" onclick="cancelEdit('${msg.id}')">取消</button>
                                     </div>` 
                                    : escapeHtml(msg.content)}
                            </div>
                            ${!isUser ? `
                            <div class="msg-actions">
                                <button class="btn btn-xs" onclick="startEdit('${msg.id}')" title="修改此回复">✏️ 编辑</button>
                                <button class="btn btn-xs" onclick="toggleThinking('${msg.id}')" title="查看/编辑思考内容">🧠 思考</button>
                                <button class="btn btn-xs" onclick="regenerateMessage('${msg.id}')" title="重新生成此回复">🔄 重新生成</button>
                                <button class="btn btn-xs danger" onclick="deleteMessage('${msg.id}')" title="删除此消息">🗑</button>
                            </div>
                            <div class="msg-thinking ${msg._thinkingExpanded ? 'expanded' : ''}" id="thinking-${msg.id}">
                                <div class="msg-thinking-label">🧠 思考过程（仅本地可见，不发送给其他角色）</div>
                                <div class="msg-thinking-content" id="thinkingContent-${msg.id}">${escapeHtml(msg.thinking || '（暂无思考内容，点击编辑按钮添加）')}</div>
                                <button class="btn btn-xs" style="margin-top:6px;" onclick="editThinking('${msg.id}')">编辑思考</button>
                            </div>
                            ` : ''}
                        </div>`;
                    }).join('');
                }
                // 滚动到底部
                setTimeout(() => {
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }, 50);
            }

            function renderReplyOrder() {
                const session = getActiveSession();
                const container = document.getElementById('replyOrderTags');
                if (!session || appData.characters.length === 0) {
                    container.innerHTML =
                        '<span style="font-size:11px;color:var(--text-muted);">暂无角色，请先在角色管理中创建</span>';
                    return;
                }
                const order = session.replyOrder || [];
                container.innerHTML = appData.characters.map((char, idx) => {
                    const orderIndex = order.indexOf(char.id);
                    const isSelected = orderIndex >= 0;
                    return `
                        <span class="reply-tag ${isSelected ? 'selected' : ''}" 
                              onclick="toggleCharInReplyOrder('${char.id}')" 
                              title="${isSelected ? '点击移除（顺序第'+(orderIndex+1)+'位）' : '点击加入回复顺序'}">
                            <span class="tag-dot" style="background:${char.color};"></span>
                            ${escapeHtml(char.name)}
                            ${isSelected ? `<span class="tag-order">${orderIndex + 1}</span>` : ''}
                        </span>`;
                }).join('');
            }

            function updateSendButton() {
                const btn = document.getElementById('btnSend');
                const session = getActiveSession();
                const input = document.getElementById('userInput');
                const hasText = input.value.trim().length > 0;
                const hasChars = session && (session.replyOrder || []).length > 0;
                btn.disabled = !hasText || !hasChars || btn.classList.contains('loading');
            }

            // ==================== 会话操作 ====================
            window.selectSession = function(id) {
                appData.activeSessionId = id;
                saveData();
                renderAll();
                // 移动端关闭侧边栏
                document.getElementById('sidebar').classList.remove('open');
            };

            window.createSession = function() {
                const session = {
                    id: generateId(),
                    name: '对话 ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                    messages: [],
                    replyOrder: appData.characters.map(c => c.id),
                    createdAt: Date.now(),
                };
                appData.sessions.push(session);
                appData.activeSessionId = session.id;
                saveData();
                renderAll();
                showToast('新会话已创建', 'success');
            };

            window.renameSession = function(id) {
                const session = appData.sessions.find(s => s.id === id);
                if (!session) return;
                const newName = prompt('重命名会话：', session.name);
                if (newName && newName.trim()) {
                    session.name = newName.trim();
                    saveData();
                    renderAll();
                }
            };

            window.deleteSession = function(id) {
                if (appData.sessions.length <= 1) {
                    showToast('至少保留一个会话', 'info');
                    return;
                }
                if (!confirm('确定删除此会话及其所有消息吗？此操作不可恢复。')) return;
                appData.sessions = appData.sessions.filter(s => s.id !== id);
                if (appData.activeSessionId === id) {
                    appData.activeSessionId = appData.sessions[0]?.id || null;
                }
                saveData();
                renderAll();
                showToast('会话已删除', 'info');
            };

            window.clearAllSessions = function() {
                if (!confirm('确定清空所有会话和消息吗？此操作不可恢复。')) return;
                appData.sessions = [{
                    id: generateId(),
                    name: '新对话',
                    messages: [],
                    replyOrder: appData.characters.map(c => c.id),
                    createdAt: Date.now(),
                }];
                appData.activeSessionId = appData.sessions[0].id;
                saveData();
                renderAll();
                showToast('所有会话已清空', 'info');
            };

            // ==================== 回复顺序 ====================
            window.toggleCharInReplyOrder = function(charId) {
                const session = getActiveSession();
                if (!session) return;
                if (!session.replyOrder) session.replyOrder = [];
                const idx = session.replyOrder.indexOf(charId);
                if (idx >= 0) {
                    session.replyOrder.splice(idx, 1);
                } else {
                    session.replyOrder.push(charId);
                }
                saveData();
                renderReplyOrder();
                updateSendButton();
            };

            window.resetReplyOrder = function() {
                const session = getActiveSession();
                if (!session) return;
                session.replyOrder = appData.characters.map(c => c.id);
                saveData();
                renderReplyOrder();
                updateSendButton();
                showToast('回复顺序已重置为全部角色', 'info');
            };

            // ==================== 消息操作 ====================
            window.sendMessage = async function() {
                const session = getActiveSession();
                if (!session) return;
                const input = document.getElementById('userInput');
                const text = input.value.trim();
                if (!text) return;
                if (!session.replyOrder || session.replyOrder.length === 0) {
                    showToast('请至少选择一个参与回复的角色', 'error');
                    return;
                }
                const btnSend = document.getElementById('btnSend');
                btnSend.classList.add('loading');
                btnSend.disabled = true;
                btnSend.textContent = '发送中...';

                // 添加用户消息
                const userMsg = {
                    id: generateId(),
                    role: 'user',
                    characterId: null,
                    characterName: '用户',
                    content: text,
                    thinking: '',
                    timestamp: Date.now(),
                };
                session.messages.push(userMsg);
                input.value = '';
                input.style.height = 'auto';
                saveData();
                renderAll();
                updateSendButton();
                btnSend.classList.add('loading');
                btnSend.disabled = true;
                btnSend.textContent = '回复中...';

                // 按顺序让角色回复
                const replyOrder = [...session.replyOrder];
                for (let i = 0; i < replyOrder.length; i++) {
                    const charId = replyOrder[i];
                    const char = getCharacterById(charId);
                    if (!char) continue;
                    btnSend.textContent = `回复中 (${i+1}/${replyOrder.length})...`;

                    try {
                        const response = await callAI(session, char);
                        const thinkingContent = response.thinking || '';
                        const responseContent = response.content || '(空回复)';
                        const aiMsg = {
                            id: generateId(),
                            role: 'assistant',
                            characterId: char.id,
                            characterName: char.name,
                            content: responseContent,
                            thinking: thinkingContent,
                            timestamp: Date.now(),
                            _thinkingExpanded: false,
                        };
                        session.messages.push(aiMsg);
                        saveData();
                        renderAll();
                    } catch (err) {
                        const errorMsg = {
                            id: generateId(),
                            role: 'assistant',
                            characterId: char.id,
                            characterName: char.name,
                            content: `❌ **回复失败**: ${escapeHtml(err.message)}`,
                            thinking: '',
                            timestamp: Date.now(),
                            _thinkingExpanded: false,
                        };
                        session.messages.push(errorMsg);
                        saveData();
                        renderAll();
                        showToast(`${char.name} 回复失败: ${err.message}`, 'error');
                        // 继续下一个角色
                    }
                }

                btnSend.classList.remove('loading');
                btnSend.textContent = '发送';
                updateSendButton();
                saveData();
                renderAll();
            };

            async function callAI(session, character) {
                // 构建消息历史（排除thinking内容）
                const messages = [{ role: 'system', content: character.systemPrompt || '你是一个AI助手。' }];

                for (const msg of session.messages) {
                    if (msg.role === 'user') {
                        messages.push({ role: 'user', content: msg.content });
                    } else if (msg.role === 'assistant') {
                        // 只发送content，不发送thinking
                        messages.push({ role: 'assistant', content: msg.content });
                    }
                }

                const apiBase = character.apiBase || appData.globalApiBase || DEFAULT_API_BASE;
                const apiKey = character.apiKey || appData.globalApiKey || '';
                const model = character.model || 'gpt-4';
                const temperature = parseFloat(character.temperature) || 0.7;
                const maxTokens = parseInt(character.maxTokens) || 2048;

                if (!apiKey) {
                    throw new Error('未设置API Key，请在角色设置或全局设置中配置');
                }

                const url = apiBase.replace(/\/+$/, '') + '/chat/completions';
                const body = {
                    model: model,
                    messages: messages,
                    temperature: temperature,
                    max_tokens: maxTokens,
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                    },
                    body: JSON.stringify(body),
                });

                if (!response.ok) {
                    const errText = await response.text();
                    let errMsg = `HTTP ${response.status}`;
                    try {
                        const errJson = JSON.parse(errText);
                        errMsg = errJson.error?.message || errJson.message || errMsg;
                    } catch (e) {
                        errMsg = errText.slice(0, 200) || errMsg;
                    }
                    throw new Error(errMsg);
                }

                const data = await response.json();
                let fullContent = '';
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    fullContent = data.choices[0].message.content || '';
                } else {
                    throw new Error('API响应格式异常');
                }

                // 尝试解析thinking标签
                let thinking = '';
                let cleanContent = fullContent;
                const thinkMatch = fullContent.match(/<thinking>([\s\S]*?)<\/thinking>/i);
                if (thinkMatch) {
                    thinking = thinkMatch[1].trim();
                    cleanContent = fullContent.replace(/<thinking>[\s\S]*?<\/thinking>/gi, '').trim();
                }
                // 也尝试匹配 格式
                const thinkMatch2 = cleanContent.match(/ response([\s\S]*?) response/i);
                if (thinkMatch2 && !thinking) {
                    thinking = thinkMatch2[1].trim();
                    cleanContent = cleanContent.replace(/ response[\s\S]*? response/gi, '').trim();
                }

                return { content: cleanContent || fullContent, thinking };
            }

            window.startEdit = function(msgId) {
                const session = getActiveSession();
                if (!session) return;
                const msg = session.messages.find(m => m.id === msgId);
                if (!msg) return;
                msg._editing = true;
                saveData();
                renderAll();
                setTimeout(() => {
                    const textarea = document.getElementById('editTextarea-' + msgId);
                    if (textarea) textarea.focus();
                }, 100);
            };

            window.saveEdit = function(msgId) {
                const session = getActiveSession();
                if (!session) return;
                const msg = session.messages.find(m => m.id === msgId);
                if (!msg) return;
                const textarea = document.getElementById('editTextarea-' + msgId);
                if (textarea) {
                    msg.content = textarea.value;
                }
                msg._editing = false;
                saveData();
                renderAll();
                showToast('消息已更新', 'success');
            };

            window.cancelEdit = function(msgId) {
                const session = getActiveSession();
                if (!session) return;
                const msg = session.messages.find(m => m.id === msgId);
                if (!msg) return;
                msg._editing = false;
                saveData();
                renderAll();
            };

            window.toggleThinking = function(msgId) {
                const session = getActiveSession();
                if (!session) return;
                const msg = session.messages.find(m => m.id === msgId);
                if (!msg) return;
                msg._thinkingExpanded = !msg._thinkingExpanded;
                saveData();
                renderAll();
                if (msg._thinkingExpanded) {
                    setTimeout(() => {
                        const el = document.getElementById('thinking-' + msgId);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 150);
                }
            };

            window.editThinking = function(msgId) {
                const session = getActiveSession();
                if (!session) return;
                const msg = session.messages.find(m => m.id === msgId);
                if (!msg) return;
                const currentThinking = msg.thinking || '';
                const newThinking = prompt('编辑思考内容（此内容仅本地保存，不会发送给API或其他角色）：', currentThinking);
                if (newThinking !== null) {
                    msg.thinking = newThinking.trim();
                    msg._thinkingExpanded = true;
                    saveData();
                    renderAll();
                    showToast('思考内容已更新', 'success');
                }
            };

            window.regenerateMessage = async function(msgId) {
                const session = getActiveSession();
                if (!session) return;
                const msgIndex = session.messages.findIndex(m => m.id === msgId);
                if (msgIndex < 0) return;
                const msg = session.messages[msgIndex];
                if (msg.role !== 'assistant') return;
                const char = getCharacterById(msg.characterId);
                if (!char) {
                    showToast('找不到对应角色', 'error');
                    return;
                }
                if (!confirm(`确定让 ${char.name} 重新回复吗？这将替换当前回复内容。`)) return;

                // 删除该消息及之后的所有消息
                session.messages = session.messages.slice(0, msgIndex);
                saveData();
                renderAll();

                const btnSend = document.getElementById('btnSend');
                btnSend.classList.add('loading');
                btnSend.disabled = true;
                btnSend.textContent = '重新生成中...';

                try {
                    const response = await callAI(session, char);
                    const aiMsg = {
                        id: generateId(),
                        role: 'assistant',
                        characterId: char.id,
                        characterName: char.name,
                        content: response.content || '(空回复)',
                        thinking: response.thinking || '',
                        timestamp: Date.now(),
                        _thinkingExpanded: false,
                    };
                    session.messages.push(aiMsg);
                    saveData();
                    renderAll();
                } catch (err) {
                    const errorMsg = {
                        id: generateId(),
                        role: 'assistant',
                        characterId: char.id,
                        characterName: char.name,
                        content: `❌ **重新生成失败**: ${escapeHtml(err.message)}`,
                        thinking: '',
                        timestamp: Date.now(),
                        _thinkingExpanded: false,
                    };
                    session.messages.push(errorMsg);
                    saveData();
                    renderAll();
                    showToast(`重新生成失败: ${err.message}`, 'error');
                }
                btnSend.classList.remove('loading');
                btnSend.textContent = '发送';
                updateSendButton();
            };

            window.deleteMessage = function(msgId) {
                const session = getActiveSession();
                if (!session) return;
                const msgIndex = session.messages.findIndex(m => m.id === msgId);
                if (msgIndex < 0) return;
                if (!confirm('删除此消息及其之后的所有消息吗？')) return;
                session.messages = session.messages.slice(0, msgIndex);
                saveData();
                renderAll();
                showToast('消息已删除', 'info');
            };

            // ==================== 角色管理 ====================
            window.openCharacterEditor = function(charId) {
                appData.editingCharId = charId;
                const char = charId ? getCharacterById(charId) : null;
                document.getElementById('characterModalTitle').textContent = char ? '编辑角色' : '新建角色';
                document.getElementById('charName').value = char ? char.name : '';
                document.getElementById('charColor').value = char ? char.color : '#6c8cff';
                document.getElementById('charPrompt').value = char ? char.systemPrompt : '';
                document.getElementById('charModel').value = char ? char.model : 'gpt-4';
                document.getElementById('charTemp').value = char ? char.temperature : 0.7;
                document.getElementById('charMaxTokens').value = char ? char.maxTokens : 2048;
                document.getElementById('charApiBase').value = char ? (char.apiBase || '') : '';
                document.getElementById('charApiKey').value = char ? (char.apiKey || '') : '';
                document.getElementById('btnDeleteChar').style.display = char ? 'inline-block' : 'none';
                document.getElementById('characterModal').style.display = 'flex';
            };

            window.closeCharacterModal = function() {
                document.getElementById('characterModal').style.display = 'none';
                appData.editingCharId = null;
            };

            window.saveCharacter = function() {
                const name = document.getElementById('charName').value.trim();
                if (!name) { showToast('请输入角色名称', 'error'); return; }
                const charData = {
                    id: appData.editingCharId || generateId(),
                    name: name,
                    color: document.getElementById('charColor').value || '#6c8cff',
                    systemPrompt: document.getElementById('charPrompt').value.trim(),
                    model: document.getElementById('charModel').value.trim() || 'gpt-4',
                    temperature: parseFloat(document.getElementById('charTemp').value) || 0.7,
                    maxTokens: parseInt(document.getElementById('charMaxTokens').value) || 2048,
                    apiBase: document.getElementById('charApiBase').value.trim(),
                    apiKey: document.getElementById('charApiKey').value.trim(),
                    createdAt: Date.now(),
                };

                if (appData.editingCharId) {
                    const idx = appData.characters.findIndex(c => c.id === appData.editingCharId);
                    if (idx >= 0) {
                        charData.createdAt = appData.characters[idx].createdAt;
                        appData.characters[idx] = charData;
                    }
                } else {
                    appData.characters.push(charData);
                    // 自动添加到当前会话的回复顺序
                    const session = getActiveSession();
                    if (session && session.replyOrder) {
                        if (!session.replyOrder.includes(charData.id)) {
                            session.replyOrder.push(charData.id);
                        }
                    }
                }
                appData.editingCharId = null;
                document.getElementById('characterModal').style.display = 'none';
                saveData();
                renderAll();
                showToast('角色已保存', 'success');
            };

            window.deleteCharacter = function() {
                if (!appData.editingCharId) return;
                deleteCharacterById(appData.editingCharId);
                document.getElementById('characterModal').style.display = 'none';
                appData.editingCharId = null;
            };

            window.deleteCharacterById = function(charId) {
                if (appData.characters.length <= 1) {
                    showToast('至少保留一个角色', 'info');
                    return;
                }
                if (!confirm('确定删除此角色吗？相关会话的回复顺序将被更新。')) return;
                appData.characters = appData.characters.filter(c => c.id !== charId);
                // 清理会话中的回复顺序
                appData.sessions.forEach(s => {
                    if (s.replyOrder) s.replyOrder = s.replyOrder.filter(id => id !== charId);
                    // 清理消息中的角色引用
                    s.messages.forEach(m => {
                        if (m.characterId === charId) m.characterId = null;
                    });
                });
                saveData();
                renderAll();
                showToast('角色已删除', 'info');
            };

            window.duplicateCharacter = function(charId) {
                const char = getCharacterById(charId);
                if (!char) return;
                const newChar = { ...char, id: generateId(), name: char.name + ' (副本)', createdAt: Date.now() };
                appData.characters.push(newChar);
                saveData();
                renderAll();
                showToast('角色已复制', 'success');
            };

            window.openGlobalSettings = function() {
                const apiBase = prompt('全局默认API Base URL（留空使用OpenAI官方）：',
                    appData.globalApiBase || DEFAULT_API_BASE);
                if (apiBase !== null) {
                    appData.globalApiBase = apiBase.trim() || DEFAULT_API_BASE;
                }
                const apiKey = prompt('全局默认API Key（留空则不修改）：', '');
                if (apiKey !== null && apiKey.trim()) {
                    appData.globalApiKey = apiKey.trim();
                }
                saveData();
                renderAll();
                showToast('全局设置已更新', 'success');
            };

            // ==================== 侧边栏 ====================
            window.switchSidebarTab = function(tab) {
                appData.sidebarTab = tab;
                saveData();
                renderAll();
            };

            window.toggleSidebar = function() {
                document.getElementById('sidebar').classList.toggle('open');
            };

            // ==================== 输入处理 ====================
            window.handleInputKey = function(event) {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    const btn = document.getElementById('btnSend');
                    if (!btn.disabled) sendMessage();
                }
                // 自动调整高度
                setTimeout(() => {
                    const textarea = document.getElementById('userInput');
                    textarea.style.height = 'auto';
                    textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
                    updateSendButton();
                }, 10);
            };

            document.getElementById('userInput').addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 150) + 'px';
                updateSendButton();
            });

            // ==================== 导入导出 ====================
            window.exportData = function() {
                const exportObj = {
                    characters: appData.characters,
                    sessions: appData.sessions,
                    globalApiBase: appData.globalApiBase,
                    globalApiKey: '', // 默认不导出API Key
                    exportDate: new Date().toISOString(),
                    version: '1.0',
                };
                const includeKeys = confirm('导出数据中是否包含API Key？\n\n⚠️ API Key是敏感信息，建议仅在安全环境下导出。\n点击"确定"包含Key，"取消"则不包含。');
                if (includeKeys) {
                    exportObj.globalApiKey = appData.globalApiKey;
                    // 也导出角色的API Key
                    exportObj.characters = appData.characters.map(c => ({ ...c }));
                } else {
                    exportObj.characters = appData.characters.map(c => ({ ...c, apiKey: '' }));
                }
                const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ai-chat-backup-${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('数据已导出', 'success');
            };

            window.importData = function(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (!imported.characters || !imported.sessions) {
                            throw new Error('数据格式不正确');
                        }
                        const mode = confirm(
                            '选择导入模式：\n\n点击"确定" = 合并导入（保留现有数据，添加导入的数据）\n点击"取消" = 替换导入（清除现有数据）');
                        if (mode) {
                            // 合并模式
                            const existingCharIds = new Set(appData.characters.map(c => c.id));
                            const existingSessionIds = new Set(appData.sessions.map(s => s.id));
                            for (const char of imported.characters) {
                                if (!existingCharIds.has(char.id)) {
                                    appData.characters.push(char);
                                }
                            }
                            for (const sess of imported.sessions) {
                                if (!existingSessionIds.has(sess.id)) {
                                    appData.sessions.push(sess);
                                }
                            }
                        } else {
                            // 替换模式
                            appData.characters = imported.characters;
                            appData.sessions = imported.sessions;
                            appData.activeSessionId = imported.sessions[0]?.id || null;
                        }
                        if (imported.globalApiBase) appData.globalApiBase = imported.globalApiBase;
                        if (imported.globalApiKey) appData.globalApiKey = imported.globalApiKey;
                        saveData();
                        renderAll();
                        showToast('数据导入成功', 'success');
                    } catch (err) {
                        showToast('导入失败：' + err.message, 'error');
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            // ==================== Toast ====================
            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(120%)';
                    toast.style.transition = 'all 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }, 2500);
            }

            // ==================== 工具函数 ====================
            function escapeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 初始化 ====================
            loadData();
            renderAll();
            updateSendButton();

            // 全局点击处理（关闭移动端侧边栏）
            document.addEventListener('click', function(e) {
                const sidebar = document.getElementById('sidebar');
                const toggle = document.querySelector('.sidebar-toggle');
                if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                    if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
                        sidebar.classList.remove('open');
                    }
                }
            });

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    saveData();
                    showToast('数据已保存', 'success');
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    createSession();
                }
            });

            console.log('🚀 多角色AI对话工作台已就绪');
            console.log('   - 管理角色：左侧面板 > 角色标签');
            console.log('   - 回复顺序：输入框上方点击角色标签切换');
            console.log('   - 编辑消息：悬停消息 > 点击编辑按钮');
            console.log('   - 思考内容：点击消息的"思考"按钮查看/编辑');
            console.log('   - 导入导出：顶部按钮');
            console.log('   - 快捷键：Ctrl+S 保存 | Ctrl+N 新建会话');
        })();
    </script>
</body>
</html>
