<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>孟德尔遗传学模拟器</title>
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --border: #ccc;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; /* 防止拖拽出滚动条 */
            user-select: none;
        }
        /* 顶部工具栏 */
        #toolbar {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 60px;
            background-color: #333;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        button {
            padding: 8px 16px;
            margin-right: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-dark); }
        .btn-exp { background-color: #2196F3; }
        .btn-exp:hover { background-color: #1976D2; }
        
        #toast {
            margin-left: auto; margin-right: 40px;
            color: #FFEB3B; font-weight: bold;
        }

        /* 工作区与画布 */
        #workspace {
            position: absolute;
            top: 60px; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
            background-size: 20px 20px;
        }
        #canvas-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 让鼠标穿透SVG点击到方格 */
            z-index: 1;
        }

        /* 生物方格卡片 */
        .organism-card {
            position: absolute;
            width: 180px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }
        .organism-card.active-target {
            border-color: #2196F3;
            box-shadow: 0 0 10px #2196F3;
        }
        .card-header {
            height: 25px;
            background: #e0e0e0;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #555;
        }
        .card-body {
            padding: 10px;
            pointer-events: auto;
        }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 3px; color: #333; }
        .input-group input[type="text"] {
            width: 100%; padding: 4px; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 3px;
        }
        .sex-group {
            display: flex; justify-content: space-around; font-size: 14px;
        }
        .card-actions {
            display: flex; border-top: 1px solid #eee;
        }
        .card-actions button {
            flex: 1; margin: 0; border-radius: 0; padding: 6px 0;
            background: transparent; color: #333; font-weight: normal; font-size: 12px;
        }
        .card-actions button:hover { background: #eee; }
        .card-actions button.btn-delete { color: #f44336; }
        
        /* 模态框 (实验结果) */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        #modal-content {
            background: white; padding: 20px; border-radius: 8px;
            width: 400px; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); user-select: text;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        .close-btn { background: #f44336; float: right; margin: 0; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="createOrganism()">➕ 添加生物</button>
        <button class="btn-exp" onclick="startExperiment()">🧪 启动交配实验</button>
        <div id="toast"></div>
    </div>

    <div id="workspace">
        <!-- SVG用于绘制连线 -->
        <svg id="canvas-svg">
            <line id="cross-line" x1="0" y1="0" x2="0" y2="0" stroke="#FF5722" stroke-width="3" stroke-dasharray="5,5" style="display:none;" />
        </svg>
    </div>

    <!-- 实验结果模态框 -->
    <div id="modal-overlay">
        <div id="modal-content">
            <button class="close-btn" onclick="closeModal()">关闭</button>
            <h2 style="margin-top:0;">实验统计结果</h2>
            <p id="exp-info"></p>
            <table>
                <thead>
                    <tr><th>子代基因型</th><th>数量</th><th>比例</th></tr>
                </thead>
                <tbody id="exp-tbody"></tbody>
            </table>
        </div>
    </div>

<script>
    // 系统状态
    let entities = {}; // 存储所有生物的数据
    let entityIdCounter = 0;
    
    // 拖拽状态
    let isDragging = false;
    let dragTarget = null;
    let offsetX = 0, offsetY = 0;

    // 单次连线交配状态
    let isCrossing = false;
    let sourceCrossId = null;

    // 实验模式状态
    let expMode = 0; // 0: 关闭, 1: 等待选亲本A, 2: 等待选亲本B
    let expParentA = null;

    const workspace = document.getElementById('workspace');
    const svgLine = document.getElementById('cross-line');
    const toastEl = document.getElementById('toast');

    // 提示信息控制
    function showToast(msg) { toastEl.innerText = msg; }
    function clearToast() { toastEl.innerText = ''; }

    // ================== 数据与核心逻辑 ==================

    // 解析基因输入 (例："Aa,Bb" 或 "AaBb" -> { A:['A','a'], B:['B','b'] })
    function parseGenotype(str) {
        str = str.replace(/[^a-zA-Z]/g, ''); // 移除非字母
        if (str.length % 2 !== 0) return null; // 必须成对
        
        let traits = {};
        for (let i = 0; i < str.length; i++) {
            let char = str[i];
            let key = char.toUpperCase();
            if (!traits[key]) traits[key] = [];
            traits[key].push(char);
        }
        
        // 验证每种基因是否恰好是2个等位基因 (例如不允许 AAA)
        for (let key in traits) {
            if (traits[key].length !== 2) return null;
            // 规范化排序: 大写在前 Aa
            traits[key].sort((a, b) => (a < b ? -1 : 1));
        }
        return traits;
    }

    // 验证能否交配并返回亲本解析结果
    function validateCross(id1, id2) {
        let p1 = entities[id1], p2 = entities[id2];
        let t1 = parseGenotype(p1.geno);
        let t2 = parseGenotype(p2.geno);
        
        if (!t1 || !t2) return { valid: false, msg: "基因格式错误，需成对字母(如AaBb)" };
        
        // 判断物种 (比较包含的基因类型字母是否一致)
        let s1 = Object.keys(t1).sort().join('');
        let s2 = Object.keys(t2).sort().join('');
        if (s1 !== s2) return { valid: false, msg: "基因种类不一致，属于不同物种，存在生殖隔离！" };

        // 验证性别
        let ok = false;
        if (id1 === id2) {
            // 自交必须是雌雄同体
            ok = (p1.sexM && p1.sexF);
        } else {
            ok = (p1.sexM && p2.sexF) || (p1.sexF && p2.sexM);
        }
        if (!ok) return { valid: false, msg: "性别不匹配，无法交配！" };

        return { valid: true, t1: t1, t2: t2 };
    }

    // 获取配子集合 (笛卡尔积)
    function getGametes(traits) {
        let keys = Object.keys(traits).sort();
        let gametes = [''];
        for (let key of keys) {
            let temp = [];
            let alleles = traits[key];
            for (let g of gametes) {
                temp.push(g + alleles[0]);
                temp.push(g + alleles[1]);
            }
            gametes = temp;
        }
        return gametes;
    }

    // 结合配子生成子代基因型
    function combineGametes(g1, g2) {
        let chars1 = g1.split(''), chars2 = g2.split('');
        let traits = [];
        for (let i = 0; i < chars1.length; i++) {
            let alleles = [chars1[i], chars2[i]];
            alleles.sort((a, b) => (a < b ? -1 : 1)); // 大写在前
            traits.push(alleles.join(''));
        }
        return traits.join('');
    }

    // 单次随机生成一个子代
    function generateSingleChild(t1, t2) {
        let gametes1 = getGametes(t1);
        let gametes2 = getGametes(t2);
        let g1 = gametes1[Math.floor(Math.random() * gametes1.length)];
        let g2 = gametes2[Math.floor(Math.random() * gametes2.length)];
        return combineGametes(g1, g2);
    }


    // ================== UI 与 交互 ==================

    function createOrganism(x = 50, y = 50, geno = "Aa", sexM = true, sexF = true) {
        let id = "org_" + (++entityIdCounter);
        entities[id] = { id, x, y, geno, sexM, sexF };
        renderOrganism(id);
    }

    function renderOrganism(id) {
        let data = entities[id];
        let el = document.createElement('div');
        el.className = 'organism-card';
        el.id = id;
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';

        el.innerHTML = `
            <div class="card-header">拖拽移动</div>
            <div class="card-body" onmousedown="event.stopPropagation()">
                <div class="input-group">
                    <label>遗传因子 (例: AaBb):</label>
                    <input type="text" id="geno_${id}" value="${data.geno}" onchange="updateData('${id}')">
                </div>
                <div class="sex-group">
                    <label><input type="checkbox" id="sexM_${id}" ${data.sexM?'checked':''} onchange="updateData('${id}')"> ♂ 雄</label>
                    <label><input type="checkbox" id="sexF_${id}" ${data.sexF?'checked':''} onchange="updateData('${id}')"> ♀ 雌</label>
                </div>
            </div>
            <div class="card-actions" onmousedown="event.stopPropagation()">
                <button onclick="cloneOrganism('${id}')">复制</button>
                <button onclick="startCross('${id}')">交配</button>
                <button class="btn-delete" onclick="deleteOrganism('${id}')">删除</button>
            </div>
        `;
        
        // 绑定卡片点击事件（用于实验模式和交配模式选定目标）
        el.onmousedown = (e) => {
            if(e.target.className === 'card-header') return; // 让拖拽逻辑处理
            handleCardClick(id);
        };

        // 绑定拖拽事件
        let header = el.querySelector('.card-header');
        header.onmousedown = (e) => {
            if(expMode > 0 || isCrossing) {
                handleCardClick(id); // 如果在特殊模式下，当做点击处理
                return;
            }
            isDragging = true;
            dragTarget = el;
            let rect = el.getBoundingClientRect();
            // 计算鼠标相对卡片左上角的偏移量
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            el.style.zIndex = 20; // 拖拽时置顶
        };

        workspace.appendChild(el);
    }

    function updateData(id) {
        entities[id].geno = document.getElementById(`geno_${id}`).value;
        entities[id].sexM = document.getElementById(`sexM_${id}`).checked;
        entities[id].sexF = document.getElementById(`sexF_${id}`).checked;
    }

    function cloneOrganism(id) {
        updateData(id); // 确保数据最新
        let d = entities[id];
        createOrganism(d.x + 30, d.y + 30, d.geno, d.sexM, d.sexF);
    }

    function deleteOrganism(id) {
        delete entities[id];
        let el = document.getElementById(id);
        if(el) el.remove();
    }

    // --- 拖拽全局事件 ---
    document.addEventListener('mousemove', (e) => {
        if (isDragging && dragTarget) {
            let x = e.clientX - offsetX;
            // 减去toolbar的高度
            let y = e.clientY - offsetY - 60; 
            if(x < 0) x = 0;
            if(y < 0) y = 0;
            dragTarget.style.left = x + 'px';
            dragTarget.style.top = y + 'px';
            entities[dragTarget.id].x = x;
            entities[dragTarget.id].y = y;
        }

        // 绘制交配连线
        if (isCrossing && sourceCrossId) {
            let srcEl = document.getElementById(sourceCrossId);
            let rect = srcEl.getBoundingClientRect();
            let srcX = rect.left + rect.width / 2;
            let srcY = rect.top + rect.height / 2 - 60; // 减掉toolbar高度

            svgLine.setAttribute('x1', srcX);
            svgLine.setAttribute('y1', srcY);
            svgLine.setAttribute('x2', e.clientX);
            svgLine.setAttribute('y2', e.clientY - 60);
        }
    });

    document.addEventListener('mouseup', () => {
        if (isDragging && dragTarget) {
            dragTarget.style.zIndex = 10;
            isDragging = false;
            dragTarget = null;
        }
    });

    // --- 交配与连线逻辑 ---
    function startCross(id) {
        if (expMode > 0) return; // 实验模式下禁用
        isCrossing = true;
        sourceCrossId = id;
        svgLine.style.display = 'block';
        showToast("请点击另一个方格进行交配 (点击自身可自交)");
    }

    function cancelCross() {
        isCrossing = false;
        sourceCrossId = null;
        svgLine.style.display = 'none';
        clearToast();
    }

    // 单击卡片时的路由分配
    function handleCardClick(id) {
        if (isCrossing) {
            doCross(sourceCrossId, id);
        } else if (expMode === 1) {
            expParentA = id;
            expMode = 2;
            document.getElementById(id).classList.add('active-target');
            showToast("已选择亲本1，请选择第二个亲本 (点击同一个进行自交)");
        } else if (expMode === 2) {
            document.querySelectorAll('.active-target').forEach(e=>e.classList.remove('active-target'));
            runExperimentLogic(expParentA, id);
        }
    }

    // 执行单次交配
    function doCross(id1, id2) {
        updateData(id1); updateData(id2);
        let res = validateCross(id1, id2);
        
        if (!res.valid) {
            alert(res.msg);
        } else {
            let childGeno = generateSingleChild(res.t1, res.t2);
            // 计算新方格的位置 (两个亲本中间)
            let el1 = document.getElementById(id1), el2 = document.getElementById(id2);
            let x = (parseInt(el1.style.left) + parseInt(el2.style.left)) / 2;
            let y = (parseInt(el1.style.top) + parseInt(el2.style.top)) / 2 + 50;
            // 随机性别
            let isM = Math.random() > 0.5;
            let isF = Math.random() > 0.5;
            if(!isM && !isF) isM = true; // 确保至少有一个性别
            
            createOrganism(x, y, childGeno, isM, isF);
        }
        cancelCross();
    }

    // --- 实验模式逻辑 ---
    function startExperiment() {
        if(Object.keys(entities).length === 0) {
            alert("请先添加生物！"); return;
        }
        cancelCross(); // 覆盖其他状态
        expMode = 1;
        expParentA = null;
        showToast("【实验模式】请点击选择第一个亲本");
    }

    function runExperimentLogic(id1, id2) {
        expMode = 0; // 重置状态
        clearToast();
        updateData(id1); updateData(id2);

        let res = validateCross(id1, id2);
        if (!res.valid) {
            alert("实验失败: " + res.msg); return;
        }

        let countStr = prompt("验证成功！请输入要模拟的交配次数 (例如 1000):", "1000");
        let count = parseInt(countStr);
        if (isNaN(count) || count <= 0) {
            alert("请输入有效的次数！"); return;
        }

        // 模拟实验
        let results = {};
        for(let i = 0; i < count; i++) {
            let child = generateSingleChild(res.t1, res.t2);
            if(!results[child]) results[child] = 0;
            results[child]++;
        }

        showExperimentResults(entities[id1].geno, entities[id2].geno, count, results);
    }

    function showExperimentResults(g1, g2, total, results) {
        let modal = document.getElementById('modal-overlay');
        let info = document.getElementById('exp-info');
        let tbody = document.getElementById('exp-tbody');
        
        info.innerHTML = `亲代: <b>${g1}</b> × <b>${g2}</b> <br>总交配次数: <b>${total}</b>`;
        tbody.innerHTML = '';

        // 按数量排序输出
        let sorted = Object.entries(results).sort((a,b) => b[1] - a[1]);

        for(let [geno, count] of sorted) {
            let tr = document.createElement('tr');
            let percent = ((count / total) * 100).toFixed(2) + '%';
            tr.innerHTML = `<td>${geno}</td><td>${count}</td><td>${percent}</td>`;
            tbody.appendChild(tr);
        }

        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    // 点击空白处取消连线/实验状态
    workspace.addEventListener('mousedown', (e) => {
        if (e.target === workspace || e.target === svgLine) {
            if (isCrossing) cancelCross();
            if (expMode > 0) {
                expMode = 0;
                clearToast();
                document.querySelectorAll('.active-target').forEach(el=>el.classList.remove('active-target'));
            }
        }
    });

    // 初始化时创建一个示例
    createOrganism(100, 100, "AaBb", true, true);
    createOrganism(350, 100, "AaBb", true, true);

</script>
</body>
</html>
