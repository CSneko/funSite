<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的婚礼</title>
    <style>
        /* 全局样式与浪漫渐变背景 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #ffd3e0 0%, #f9f0f2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #5a4a4e;
        }

        /* 容器通用样式 */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(226, 154, 173, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            color: #e87a90;
            margin-bottom: 20px;
        }

        /* 表单页面样式 */
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #f0c8d1;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #e87a90;
            box-shadow: 0 0 5px rgba(232, 122, 144, 0.5);
        }
        button {
            background: #e87a90;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #d85f78;
        }

        /* 生成链接展示区 */
        #link-result {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #fff0f3;
            border-radius: 8px;
            word-break: break-all;
            font-size: 12px;
            border: 1px dashed #e87a90;
        }
        #copy-btn {
            background: #fff;
            color: #e87a90;
            border: 1px solid #e87a90;
            margin-top: 10px;
        }

        /* 动画展示页面样式 */
        #display-view {
            display: none;
            background: transparent;
            box-shadow: none;
            max-width: 600px;
        }
        .names {
            font-size: 40px;
            font-weight: bold;
            color: #d85f78;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInDown 2s forwards;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }
        .heart-icon {
            color: #ff4d6d;
            font-size: 50px;
            display: inline-block;
            animation: pulse 1.2s infinite;
            margin: 10px 0;
        }
        .blessing-text {
            font-size: 20px;
            line-height: 1.6;
            color: #5a4a4e;
            opacity: 0;
            animation: fadeInUp 2s 1s forwards; /* 延迟1秒出现 */
        }

        /* 背景漂浮爱心特效 */
        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .floating-heart {
            position: absolute;
            bottom: -50px;
            color: rgba(255, 77, 109, 0.6);
            font-size: 20px;
            animation: floatUp linear infinite;
        }

        /* 关键帧动画 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- 背景特效层 -->
    <div class="floating-hearts" id="floating-hearts"></div>

    <!-- 1. 表单填写视图 -->
    <div class="container" id="form-view">
        <h1>定制婚礼祝福</h1>
        <form id="wedding-form">
            <div class="form-group">
                <label>第一位主角的姓名</label>
                <input type="text" id="name1" required placeholder="例如：张三">
            </div>
            <div class="form-group">
                <label>第二位主角的姓名</label>
                <input type="text" id="name2" required placeholder="例如：李四">
            </div>
            <div class="form-group">
                <label>爱的祝福语</label>
                <textarea id="blessing" rows="4" required placeholder="例如：愿得一人心，白首不相离..."></textarea>
            </div>
            <button type="submit">生成专属页面链接</button>
        </form>

        <div id="link-result">
            <div id="generated-url"></div>
            <button id="copy-btn" onclick="copyUrl()">复制链接</button>
        </div>
    </div>

    <!-- 2. 动画展示视图 -->
    <div class="container" id="display-view">
        <div class="names" id="display-names">名字1 & 名字2</div>
        <div class="heart-icon">❤️</div>
        <div class="blessing-text" id="display-blessing">这里是祝福语展示区域</div>
    </div>

    <script>
        // 页面加载完成后执行
        window.onload = function() {
            // 获取 URL 中的查询参数
            const urlParams = new URLSearchParams(window.location.search);
            const n1 = urlParams.get('n1');
            const n2 = urlParams.get('n2');
            const msg = urlParams.get('msg');

            // 判断是否存在参数，如果存在则进入动画展示模式
            if (n1 && n2 && msg) {
                document.getElementById('form-view').style.display = 'none';
                document.getElementById('display-view').style.display = 'block';
                
                // 填充数据
                document.getElementById('display-names').innerText = `${n1} & ${n2}`;
                document.getElementById('display-blessing').innerText = msg;

                // 启动满屏爱心飘落动画
                startFloatingHearts();
            }
        };

        // 处理表单提交
        document.getElementById('wedding-form').addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止默认提交刷新页面

            const name1 = document.getElementById('name1').value;
            const name2 = document.getElementById('name2').value;
            const blessing = document.getElementById('blessing').value;

            // 构造带参数的 URL
            const baseUrl = window.location.origin + window.location.pathname;
            const params = `?n1=${encodeURIComponent(name1)}&n2=${encodeURIComponent(name2)}&msg=${encodeURIComponent(blessing)}`;
            const finalUrl = baseUrl + params;

            // 显示生成的链接
            const resultDiv = document.getElementById('link-result');
            const urlDiv = document.getElementById('generated-url');
            urlDiv.innerText = finalUrl;
            resultDiv.style.display = 'block';
        });

        // 复制链接功能
        function copyUrl() {
            const urlText = document.getElementById('generated-url').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                const copyBtn = document.getElementById('copy-btn');
                copyBtn.innerText = '已复制！去发给TA吧';
                setTimeout(() => { copyBtn.innerText = '复制链接'; }, 3000);
            }).catch(err => {
                alert('复制失败，请手动长按选择复制');
            });
        }

        // 漂浮爱心特效生成函数
        function startFloatingHearts() {
            const heartContainer = document.getElementById('floating-hearts');
            const heartsCount = 30; // 屏幕上同时出现的爱心数量

            for (let i = 0; i < heartsCount; i++) {
                createHeart(heartContainer);
            }
        }

        function createHeart(container) {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerText = '❤';
            
            // 随机位置、大小和动画时间
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // 4s - 7s
            heart.style.animationDelay = Math.random() * 5 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';

            container.appendChild(heart);

            // 动画结束后移除并重新生成，保持爱心源源不断
            heart.addEventListener('animationend', () => {
                heart.remove();
                createHeart(container);
            });
        }
    </script>
</body>
</html>
